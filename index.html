<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>La Spesa da Isa</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat&family=Pacifico&display=swap" rel="stylesheet">

<style>
:root {
  --rosso:#E03C31;
  --verde:#2F7D32;
  --bianco:#ffffff;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:var(--verde);
  color:var(--rosso);
}

header{
  background:var(--rosso);
  color:var(--bianco);
  display:flex;
  align-items:center;
  padding:10px 20px;
}

header img{
  width:100px;
  margin-right:30px;
  border-radius:8px;
}

nav{
  display:flex;
  gap:25px;
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:600;
  text-transform:uppercase;
}

nav a:hover{
  background:white;
  color:var(--rosso);
  padding:5px 10px;
  border-radius:5px;
}

main{
  max-width:1200px;
  margin:40px auto;
  padding:0 20px;
}

/* SLIDESHOW */
.slideshow-container{
  position:relative;
  max-width:90%;
  margin:0 auto;
  height:400px;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 6px 12px rgba(0,0,0,0.2);
}

.slides{
  display:flex;
  width:300%;
  height:100%;
  transition:transform 0.6s ease;
}

.slide{
  flex:1 0 100%;
}

.slide img{
  width:100%;
  height:100%;
  object-fit:contain; /* niente zoom */
  background:black;
}

.prev,.next{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:40px;
  height:40px;
  background:rgba(0,0,0,0.4);
  color:white;
  font-size:30px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.prev{left:10px;}
.next{right:10px;}

.dots{
  text-align:center;
  margin:25px 0 50px;
}

.dot{
  height:18px;
  width:18px;
  margin:0 6px;
  background:white;
  border-radius:50%;
  display:inline-block;
  cursor:pointer;
  opacity:0.6;
}

.dot.active{
  opacity:1;
  transform:scale(1.2);
}

/* BOX */
.content-section{
  display:flex;
  flex-wrap:wrap;
  gap:40px;
  justify-content:center;
}

.content-box{
  flex:1 1 300px;
  background:var(--rosso);
  color:white;
  padding:25px;
  border-radius:12px;
  text-align:center;
  font-weight:600;
  transform:rotate(-3deg);
  transition:0.3s;
}

.content-box:nth-child(even){
  transform:rotate(3deg);
}

.content-box:hover{
  transform:rotate(0) scale(1.05);
}

/* FOOTER */
footer{
  background:var(--rosso);
  color:white;
  padding:40px 20px;
  margin-top:60px;
  text-align:center;
}

footer h2{
  font-family:'Pacifico',cursive;
}

@media(max-width:768px){
  .slideshow-container{height:250px;}
  .content-box{transform:none;}
}
</style>
</head>

<body>

<header>
<img src="https://upload.wikimedia.org/wikipedia/commons/3/36/Logo_placeholder.png" alt="Logo">
<nav>
<a href="#PRODOTTI">Prodotti</a>
<a href="#SERVIZI">Servizi</a>
<a href="#CONTATTI">Contatti</a>
</nav>
</header>

<main>

<div class="slideshow-container">
  <div class="slides" id="slides">
    <div class="slide"><img src="prodotti.jpg"></div>
    <div class="slide"><img src="posto pane..jpg"></div>
    <div class="slide"><img src="cassa.jpg"></div>
  </div>
  <div class="prev" id="prev">&#10094;</div>
  <div class="next" id="next">&#10095;</div>
</div>

<div class="dots">
  <span class="dot active" data-slide="0"></span>
  <span class="dot" data-slide="1"></span>
  <span class="dot" data-slide="2"></span>
</div>

<section class="content-section">
  <div class="content-box" id="PRODOTTI">
    <h2>PRODOTTI</h2>
    ALIMENTARI<br><br>
    GASTRONOMIA<br><br>
    FRUTTA & VERDURA<br><br>
    CASA<br><br>
    CARTOLERIA
  </div>

  <div class="content-box" id="SERVIZI">
    <h2>SERVIZI</h2>
    SPESA A DOMICILIO<br><br>
    OFFERTE<br><br>
    NOVITÀ<br><br>
    TESSERA FEDELTÀ
  </div>
</section>

</main>

<footer id="CONTATTI">
<h2>Contatti</h2>
Via della Tesa 70 – 25012 Viadana Bresciana (BS)<br>
Tel: 333 247 2741<br><br>
© 2026 La Spesa da Isa
</footer>

<script>
let index=0;
const slides=document.getElementById("slides");
const dots=document.querySelectorAll(".dot");
const total=3;

function showSlide(i){
  if(i>=total) index=0;
  else if(i<0) index=total-1;
  else index=i;

  slides.style.transform="translateX("+(-index*100)+"%)";
  dots.forEach(d=>d.classList.remove("active"));
  dots[index].classList.add("active");
}

document.getElementById("next").onclick=()=>showSlide(index+1);
document.getElementById("prev").onclick=()=>showSlide(index-1);
dots.forEach(d=>{
  d.onclick=()=>showSlide(parseInt(d.dataset.slide));
});

setInterval(()=>showSlide(index+1),5000);
</script>

</body>
</html>
